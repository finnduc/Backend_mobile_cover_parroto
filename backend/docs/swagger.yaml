basePath: /api/v1
definitions:
  go-familytree_internal_models.Attempt:
    properties:
      answers:
        items:
          $ref: '#/definitions/go-familytree_internal_models.UserAnswer'
        type: array
      completed:
        type: boolean
      created_at:
        type: string
      id:
        type: integer
      lesson_id:
        type: integer
      total_score:
        type: number
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  go-familytree_internal_models.Category:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  go-familytree_internal_models.Lesson:
    properties:
      created_at:
        type: string
      description:
        type: string
      duration:
        type: number
      id:
        type: integer
      level:
        description: easy|medium|hard
        type: string
      thumbnail_url:
        type: string
      title:
        type: string
      transcripts:
        items:
          $ref: '#/definitions/go-familytree_internal_models.Transcript'
        type: array
      updated_at:
        type: string
      video_url:
        type: string
    type: object
  go-familytree_internal_models.Transcript:
    properties:
      content:
        type: string
      created_at:
        type: string
      end_timestamp:
        type: number
      id:
        type: integer
      lesson_id:
        type: integer
      phonetic:
        type: string
      sequence:
        type: integer
      start_timestamp:
        type: number
      updated_at:
        type: string
      vietnamese:
        type: string
    type: object
  go-familytree_internal_models.UserAnswer:
    properties:
      answer_text:
        type: string
      attempt_id:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      is_correct:
        type: boolean
      score:
        type: number
      transcript_id:
        type: integer
      updated_at:
        type: string
    type: object
  go-familytree_internal_models.UserProgress:
    properties:
      answer_count:
        type: integer
      completed:
        type: boolean
      id:
        type: integer
      last_sequence:
        type: integer
      lesson_id:
        type: integer
      score_avg:
        type: number
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  go-familytree_internal_service.AnswerItemInput:
    properties:
      answer_text:
        type: string
      transcript_id:
        type: integer
    required:
    - answer_text
    - transcript_id
    type: object
  go-familytree_internal_service.AnswerResult:
    properties:
      correct_text:
        type: string
      is_correct:
        type: boolean
      score:
        type: number
    type: object
  go-familytree_internal_service.BulkAnswerResult:
    properties:
      results:
        items:
          $ref: '#/definitions/go-familytree_internal_service.AnswerResult'
        type: array
    type: object
  go-familytree_internal_service.BulkSubmitInput:
    properties:
      answers:
        items:
          $ref: '#/definitions/go-familytree_internal_service.AnswerItemInput'
        minItems: 1
        type: array
      attempt_id:
        type: integer
    required:
    - answers
    - attempt_id
    type: object
  go-familytree_internal_service.CreateLessonInput:
    properties:
      category_ids:
        items:
          type: integer
        type: array
      description:
        type: string
      duration:
        minimum: 0
        type: number
      level:
        enum:
        - easy
        - medium
        - hard
        type: string
      thumbnail_url:
        type: string
      title:
        type: string
      transcripts:
        items:
          $ref: '#/definitions/go-familytree_internal_service.CreateTranscriptInput'
        minItems: 1
        type: array
      url:
        type: string
      video_url:
        type: string
    required:
    - title
    - transcripts
    type: object
  go-familytree_internal_service.CreateTranscriptInput:
    properties:
      content:
        type: string
      end_timestamp:
        minimum: 0
        type: number
      phonetic:
        type: string
      sequence:
        minimum: 1
        type: integer
      start_timestamp:
        minimum: 0
        type: number
      vietnamese:
        type: string
    required:
    - content
    - end_timestamp
    - sequence
    - start_timestamp
    type: object
  go-familytree_internal_service.LoginInput:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  go-familytree_internal_service.RegisterInput:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - name
    - password
    type: object
  go-familytree_internal_service.SubmitAnswerInput:
    properties:
      answer_text:
        type: string
      attempt_id:
        type: integer
      transcript_id:
        type: integer
    required:
    - answer_text
    - attempt_id
    - transcript_id
    type: object
  go-familytree_internal_service.TokenPair:
    properties:
      access_token:
        type: string
      expires_in:
        description: seconds
        type: integer
      refresh_token:
        type: string
    type: object
  go-familytree_pkg_response.ResponseData:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  go-familytree_pkg_utils.ListResponse:
    properties:
      items: {}
      meta:
        $ref: '#/definitions/go-familytree_pkg_utils.PaginationMeta'
    type: object
  go-familytree_pkg_utils.PaginationMeta:
    properties:
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
    type: object
host: localhost:8002
info:
  contact: {}
  description: API for learning English via dictation (video-based).
  title: Dictation Learning System API
  version: "1.0"
paths:
  /answers:
    post:
      consumes:
      - application/json
      description: Gui cau tra loi cho mot transcript cu the va tinh diem.
      parameters:
      - description: Answer info
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-familytree_internal_service.SubmitAnswerInput'
      produces:
      - application/json
      responses:
        "200":
          description: Nop cau tra loi thanh cong
          schema:
            allOf:
            - $ref: '#/definitions/go-familytree_pkg_response.ResponseData'
            - properties:
                data:
                  $ref: '#/definitions/go-familytree_internal_service.AnswerResult'
              type: object
      security:
      - BearerAuth: []
      summary: Nop 1 cau tra loi
      tags:
      - answers
  /answers/bulk:
    post:
      consumes:
      - application/json
      description: Gui nhieu cau tra loi cung luc (phu hop dong bo du lieu).
      parameters:
      - description: Bulk answers info
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-familytree_internal_service.BulkSubmitInput'
      produces:
      - application/json
      responses:
        "200":
          description: Nop nhieu cau tra loi thanh cong
          schema:
            allOf:
            - $ref: '#/definitions/go-familytree_pkg_response.ResponseData'
            - properties:
                data:
                  $ref: '#/definitions/go-familytree_internal_service.BulkAnswerResult'
              type: object
      security:
      - BearerAuth: []
      summary: Nop nhieu cau tra loi
      tags:
      - answers
  /attempts:
    post:
      consumes:
      - application/json
      description: Bat dau mot lan luyen tap moi cho bai hoc duoc chon.
      parameters:
      - description: Attempt request
        in: body
        name: body
        required: true
        schema:
          properties:
            lesson_id:
              type: integer
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Tao attempt thanh cong
          schema:
            allOf:
            - $ref: '#/definitions/go-familytree_pkg_response.ResponseData'
            - properties:
                data:
                  $ref: '#/definitions/go-familytree_internal_models.Attempt'
              type: object
      security:
      - BearerAuth: []
      summary: Tao lan luyen tap moi
      tags:
      - attempts
  /attempts/{id}:
    get:
      description: Lay thong tin chi tiet cua mot attempt theo ID.
      parameters:
      - description: Attempt ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Lay chi tiet attempt thanh cong
          schema:
            allOf:
            - $ref: '#/definitions/go-familytree_pkg_response.ResponseData'
            - properties:
                data:
                  $ref: '#/definitions/go-familytree_internal_models.Attempt'
              type: object
      security:
      - BearerAuth: []
      summary: Chi tiet lan luyen tap
      tags:
      - attempts
  /auth/login:
    post:
      consumes:
      - application/json
      description: Xac thuc thong tin dang nhap va tra ve access token + refresh token.
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-familytree_internal_service.LoginInput'
      produces:
      - application/json
      responses:
        "200":
          description: Dang nhap thanh cong
          schema:
            allOf:
            - $ref: '#/definitions/go-familytree_pkg_response.ResponseData'
            - properties:
                data:
                  $ref: '#/definitions/go-familytree_internal_service.TokenPair'
              type: object
      summary: Dang nhap
      tags:
      - auth
  /auth/logout:
    post:
      description: Vo hieu hoa access token hien tai (dua vao blacklist) va xoa refresh
        token.
      produces:
      - application/json
      responses:
        "200":
          description: Dang xuat thanh cong
          schema:
            $ref: '#/definitions/go-familytree_pkg_response.ResponseData'
      security:
      - BearerAuth: []
      summary: Dang xuat
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Dung refresh token hop le de cap cap access token + refresh token
        moi.
      parameters:
      - description: Refresh request
        in: body
        name: body
        required: true
        schema:
          properties:
            refresh_token:
              type: string
            user_id:
              type: integer
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Lam moi token thanh cong
          schema:
            allOf:
            - $ref: '#/definitions/go-familytree_pkg_response.ResponseData'
            - properties:
                data:
                  $ref: '#/definitions/go-familytree_internal_service.TokenPair'
              type: object
      summary: Lam moi token
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Tao tai khoan nguoi dung moi bang email, mat khau va ten hien thi.
      parameters:
      - description: Registration info
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-familytree_internal_service.RegisterInput'
      produces:
      - application/json
      responses:
        "200":
          description: Tao tai khoan thanh cong
          schema:
            $ref: '#/definitions/go-familytree_pkg_response.ResponseData'
      summary: Dang ky tai khoan moi
      tags:
      - auth
  /bookmarks:
    get:
      description: Lay danh sach bai hoc da danh dau yeu thich co phan trang.
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 10, max 100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Lay danh sach bookmark thanh cong
          schema:
            allOf:
            - $ref: '#/definitions/go-familytree_pkg_response.ResponseData'
            - properties:
                data:
                  $ref: '#/definitions/go-familytree_pkg_utils.ListResponse'
              type: object
      security:
      - BearerAuth: []
      summary: Danh sach bai hoc da bookmark
      tags:
      - bookmarks
    post:
      consumes:
      - application/json
      description: Bat/tat trang thai bookmark cho bai hoc cua nguoi dung.
      parameters:
      - description: Bookmark request
        in: body
        name: body
        required: true
        schema:
          properties:
            lesson_id:
              type: integer
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Cap nhat bookmark thanh cong
          schema:
            allOf:
            - $ref: '#/definitions/go-familytree_pkg_response.ResponseData'
            - properties:
                data:
                  properties:
                    bookmarked:
                      type: boolean
                  type: object
              type: object
      security:
      - BearerAuth: []
      summary: Them/bo danh dau yeu thich
      tags:
      - bookmarks
  /categories:
    get:
      description: Lay toan bo danh muc bai hoc.
      produces:
      - application/json
      responses:
        "200":
          description: Lay danh sach category thanh cong
          schema:
            allOf:
            - $ref: '#/definitions/go-familytree_pkg_response.ResponseData'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/go-familytree_internal_models.Category'
                  type: array
              type: object
      security:
      - BearerAuth: []
      summary: Danh sach category
      tags:
      - categories
  /categories/{id}/lessons:
    get:
      description: Lay danh sach bai hoc theo category co phan trang.
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 10, max 100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Lay danh sach bai hoc theo category thanh cong
          schema:
            allOf:
            - $ref: '#/definitions/go-familytree_pkg_response.ResponseData'
            - properties:
                data:
                  $ref: '#/definitions/go-familytree_pkg_utils.ListResponse'
              type: object
      security:
      - BearerAuth: []
      summary: Danh sach bai hoc theo category
      tags:
      - categories
  /lessons:
    get:
      description: Lay danh sach bai hoc co phan trang; ho tro loc theo do kho va
        category.
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 10, max 100)
        in: query
        name: limit
        type: integer
      - description: Filter by level (easy|medium|hard)
        in: query
        name: level
        type: string
      - description: Filter by category ID
        in: query
        name: category_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Lay danh sach bai hoc thanh cong
          schema:
            allOf:
            - $ref: '#/definitions/go-familytree_pkg_response.ResponseData'
            - properties:
                data:
                  $ref: '#/definitions/go-familytree_pkg_utils.ListResponse'
              type: object
      security:
      - BearerAuth: []
      summary: Danh sach bai hoc
      tags:
      - lessons
    post:
      consumes:
      - application/json
      description: Tao bai hoc moi tu payload frontend (url + transcripts), va co
        the gan category.
      parameters:
      - description: Du lieu bai hoc tu frontend
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-familytree_internal_service.CreateLessonInput'
      produces:
      - application/json
      responses:
        "200":
          description: Tao bai hoc thanh cong
          schema:
            allOf:
            - $ref: '#/definitions/go-familytree_pkg_response.ResponseData'
            - properties:
                data:
                  $ref: '#/definitions/go-familytree_internal_models.Lesson'
              type: object
      security:
      - BearerAuth: []
      summary: Tao bai hoc
      tags:
      - lessons
  /lessons/{id}:
    get:
      description: Lay thong tin chi tiet cua mot bai hoc theo ID.
      parameters:
      - description: Lesson ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Lay chi tiet bai hoc thanh cong
          schema:
            allOf:
            - $ref: '#/definitions/go-familytree_pkg_response.ResponseData'
            - properties:
                data:
                  $ref: '#/definitions/go-familytree_internal_models.Lesson'
              type: object
      security:
      - BearerAuth: []
      summary: Chi tiet bai hoc
      tags:
      - lessons
  /lessons/{id}/transcripts:
    get:
      description: Lay toan bo transcript cua bai hoc, sap xep theo thu tu sequence.
      parameters:
      - description: Lesson ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Lay transcript thanh cong
          schema:
            allOf:
            - $ref: '#/definitions/go-familytree_pkg_response.ResponseData'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/go-familytree_internal_models.Transcript'
                  type: array
              type: object
      security:
      - BearerAuth: []
      summary: Danh sach transcript cua bai hoc
      tags:
      - lessons
  /progress/{lesson_id}:
    get:
      description: Lay tien do hien tai cua nguoi dung tren bai hoc (sequence cuoi,
        diem trung binh).
      parameters:
      - description: Lesson ID
        in: path
        name: lesson_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Lay tien do thanh cong
          schema:
            allOf:
            - $ref: '#/definitions/go-familytree_pkg_response.ResponseData'
            - properties:
                data:
                  $ref: '#/definitions/go-familytree_internal_models.UserProgress'
              type: object
      security:
      - BearerAuth: []
      summary: Tien do hoc cua nguoi dung
      tags:
      - progress
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
