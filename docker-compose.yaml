services:
  app:
    build: .
    container_name: parroto-app
    ports:
      - "8002:8002"
    volumes:
      - ./log:/app/log          # mount thư mục log ra ngoài
      - ./config.yaml:/app/config.yaml
    environment:
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - parroto-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: parroto-postgres      # khớp với config host
    environment:
      POSTGRES_USER: backend_parroto
      POSTGRES_PASSWORD: nguyen123
      POSTGRES_DB: parroto
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./migrations/002_seed.sql:/docker-entrypoint-initdb.d/002_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backend_parroto -d parroto"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - parroto-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: parroto-redis         # khớp với config host
    command: >
      redis-server
      --requirepass nguyen123
      --port 6380
    ports:
      - "6380:6380"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6380", "-a", "nguyen123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - parroto-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  parroto-network:
    driver: bridge