        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-cover-parroto_internal_core_response.BaseResponse-any'
      summary: Sync user with Firebase
      tags:
      - auth
  /auth/token:
    post:
      consumes:
      - application/json
      description: Sign in with email & password to get a Firebase ID token for use
        in protected endpoints
      parameters:
