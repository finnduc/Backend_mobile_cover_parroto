services:
  postgres:
    image: postgres:15
    container_name: engflix_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - engflix_postgres_data:/var/lib/postgresql/data

volumes:
  engflix_postgres_data: